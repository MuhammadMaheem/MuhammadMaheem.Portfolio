<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Muhammad Maheem - AI Developer & ML Engineer. Specializing in Machine Learning, Computer Vision, and building intelligent systems." />
    <meta name="keywords" content="Muhammad Maheem, AI Developer, Machine Learning, Python, React, Portfolio" />
    <meta name="author" content="Muhammad Maheem" />
    <meta name="theme-color" content="#282A36" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Muhammad Maheem | AI Developer & ML Engineer" />
    <meta property="og:description" content="Building intelligent systems that learn, adapt, and evolve. Explore my portfolio of AI/ML projects." />

    <title>Muhammad Maheem | AI Developer & ML Engineer</title>

    <!-- Google Fonts: Syne (headings) + IBM Plex Mono (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        background-color: #282A36;
        color: #F8F8F2;
        font-family: 'IBM Plex Mono', monospace;
      }
      #root {
        min-height: 100vh;
      }
      /* Loading placeholder */
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #282A36;
        gap: 1.5rem;
      }
      .loading-bar {
        width: 120px;
        height: 2px;
        background: #3a3d4f;
        position: relative;
        overflow: hidden;
      }
      .loading-bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: -40px;
        width: 40px;
        height: 100%;
        background: #61AFEF;
        animation: load-slide 1s ease-in-out infinite;
      }
      @keyframes load-slide {
        0% { left: -40px; }
        100% { left: 120px; }
      }
      .loading-text {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #a89e92;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-text">Loading</div>
        <div class="loading-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
